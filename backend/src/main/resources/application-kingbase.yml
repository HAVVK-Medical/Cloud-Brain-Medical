spring:
  config:
    activate:
      on-profile: kingbase
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:54321/cloudbrain_medical?currentSchema=public}
    username: ${DB_USERNAME:cloudbrain}
    password: ${DB_PASSWORD:cloudbrain_dev}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/kingbase/migration
