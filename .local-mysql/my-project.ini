# MySQL configuration file for project-local MySQL instance.
# This file is automatically generated by start-local-mysql.ps1 at runtime.
# The generated version uses correct absolute paths for the current machine.
# Manually edit only if you are starting mysqld outside the script.

[client]
port=3307

[mysqld]
port=3307
# basedir is set dynamically by start-local-mysql.ps1 from MYSQL_HOME env var
# datadir, log-error, pid-file, secure-file-priv are set relative to project root
socket=mysql-cloudbrain
default-storage-engine=INNODB
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci
lower_case_table_names=1
mysqlx=0
